name: Pipeline de Testes Multi-Browser (QA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    name: Testar no ${{ matrix.browser }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Garante que um erro em um navegador não cancele os outros
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            browser: chrome
          - os: ubuntu-latest
            browser: firefox
          - os: macos-latest
            browser: safari

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes Robot (Chrome/Firefox - Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          robot -d results -v BROWSER:headless${{ matrix.browser }} tests/

      - name: Executar Testes Robot (Safari - MacOS)
        if: matrix.os == 'macos-latest'
        run: |
          robot -d results -v BROWSER:${{ matrix.browser }} tests/

      - name: Upload de Evidências (Screenshots e Reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-${{ matrix.browser }}-${{ matrix.os }}
          path: results/