name: Pipeline de Testes Multi-OS (QA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  robot-tests:
    name: ${{ matrix.browser }} no ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chrome, firefox]

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes Robot
        # No Windows usamos shell diferente, mas o comando do Robot é universal
        run: |
          robot -d results -v BROWSER:headless${{ matrix.browser }} tests/
        shell: bash

      - name: Upload de Evidências (Screenshots e Reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-${{ matrix.browser }}-${{ matrix.os }}
          path: results/